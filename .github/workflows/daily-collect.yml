# PhysicalAI Pulse — RPA Daily News Collection
# 每天定时通过RPA工具全球搜集物理AI企业资讯
# 使用智谱GLM-4.5-Flash进行结构化处理后更新网站数据

name: RPA Daily News Collection

on:
  # 每天北京时间 08:00（UTC 00:00）自动运行
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

# 同一时间只允许一个采集任务运行
concurrency:
  group: rpa-collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. 安装Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # 4. 运行RPA采集脚本
      - name: Run RPA News Collector
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/rpa_collector.py

      # 5. 提交并推送更新后的数据
      - name: Commit and push data
        run: |
          git config user.name "RPA Bot"
          git config user.email "rpa-bot@physai-pulse.dev"

          # 检查数据文件是否有变化
          if git diff --quiet data/news_data.json; then
            echo "No changes to commit"
          else
            git add data/news_data.json
            git commit -m "RPA Daily Update: $(date -u '+%Y-%m-%d %H:%M') UTC

            - Collected via RPA from global news sources
            - Processed by Zhipu GLM-4.5-Flash
            - Auto-generated by GitHub Actions"
            git push
            echo "Data pushed successfully"
          fi

      # 6. 输出采集摘要
      - name: Collection summary
        if: always()
        run: |
          echo "========================================"
          echo "RPA Collection Summary"
          echo "========================================"
          echo "Run time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          if [ -f data/news_data.json ]; then
            echo "Data file size: $(du -h data/news_data.json | cut -f1)"
            echo "Last updated: $(python3 -c 'import json; d=json.load(open("data/news_data.json")); print(d["meta"]["last_updated"])')"
          else
            echo "WARNING: data/news_data.json not found"
          fi
          echo "========================================"
